<html id="ROOT" lang="en" dir="ltr">

<style>
:root{--red:#d42a3c;--red2:#b01828;--rs:rgba(212,42,60,.13);--pur:#2e0952;--pur2:#6b2f90;--pur3:#9d5fc8;--bg:#0d0d1a;--bg2:#111122;--card:#161628;--card2:#1e1e38;--brd:#252540;--brd2:#2e2e50;--t1:#eeeef8;--t2:#8888aa;--t3:#55557a;--grn:#22c55e;--ylw:#f59e0b;--err:#ef4444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',Tahoma,system-ui,sans-serif;font-size:14px}
[dir=rtl] body,[dir=rtl] input,[dir=rtl] textarea,[dir=rtl] select,[dir=rtl] button{font-family:Tahoma,'Arabic Typesetting','Simplified Arabic','Segoe UI',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red)!important;box-shadow:0 0 0 3px var(--rs)!important}
.layout{display:flex;height:100vh;overflow:hidden}
.sb{width:228px;min-width:228px;background:var(--card);border-right:1px solid var(--brd);display:flex;flex-direction:column;transition:transform .25s,width .2s,min-width .2s;overflow:hidden;flex-shrink:0}
.sb.closed{width:0;min-width:0}
[dir=rtl] .sb{border-right:none;border-left:1px solid var(--brd)}
.sb-logo{padding:14px 12px 10px;border-bottom:1px solid var(--brd);cursor:pointer}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-sec{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;padding:12px 12px 4px;font-weight:700;white-space:nowrap}
.ni{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:9px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:13px;font-family:inherit;margin-bottom:1px;text-align:left;white-space:nowrap;transition:.15s}
[dir=rtl] .ni{text-align:right}
.ni:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.ni.active{background:var(--rs);color:var(--red);font-weight:600}
.sb-foot{padding:10px;border-top:1px solid var(--brd)}
.uc{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--card2);cursor:pointer;margin-bottom:6px;transition:.15s}
.uc:hover{background:var(--brd)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;background:var(--card);height:52px;flex-shrink:0;position:relative;z-index:10}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{padding:8px 15px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:var(--red2)}
.btn-p{background:var(--pur);color:#fff}.btn-p:hover{background:var(--pur2)}
.btn-s{background:transparent;color:var(--t2);border:1px solid var(--brd2)}.btn-s:hover{color:var(--t1);background:rgba(255,255,255,.04)}
.btn-d{background:var(--err);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
input,select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);color:var(--t1);font-size:14px;font-family:inherit}
[dir=rtl] input,[dir=rtl] select,[dir=rtl] textarea{text-align:right}
[dir=rtl] input[type=date],[dir=rtl] input[type=number],[dir=rtl] input[type=email],[dir=rtl] input[type=password]{text-align:left;direction:ltr}
select{cursor:pointer}
textarea{resize:vertical}
.card{background:var(--card);border-radius:12px;border:1px solid var(--brd);padding:17px}
.badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
.tw{background:var(--card);border-radius:12px;border:1px solid var(--brd);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--brd);white-space:nowrap}
[dir=rtl] th{text-align:right}
td{padding:10px 12px;border-bottom:1px solid var(--brd);font-size:13px}
tr:last-child td{border-bottom:none}
.tr-c{cursor:pointer}.tr-c:hover td{background:var(--rs)}
.ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:16px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5);border:1px solid var(--brd2)}
.mhd{padding:15px 20px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1;border-radius:16px 16px 0 0}
.mbd{padding:20px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--card);border-radius:12px;border:1px solid var(--brd);padding:14px 16px;transition:.15s}
.kpi:hover{transform:translateY(-1px);border-color:var(--red)}
.kpi-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-v{font-size:20px;font-weight:800;line-height:1.2}
.kpi-s{font-size:11px;color:var(--t2);margin-top:3px}
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--t2);border-bottom:2px solid transparent;font-family:inherit;transition:.15s;white-space:nowrap;flex-shrink:0}
.tab-btn.active{font-weight:600;color:var(--red);border-bottom-color:var(--red)}
.tag{background:var(--rs);color:var(--red);padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(212,42,60,.2)}
.ring{border-radius:50%;border:3px solid;display:inline-flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.prog{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .4s}
.tl-item{display:flex;gap:12px;padding-bottom:13px;position:relative}
.tl-item::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:1px;background:var(--brd)}
[dir=rtl] .tl-item::before{left:auto;right:13px}
.tl-item:last-child::before{display:none}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;border:2px solid var(--brd);background:var(--card2)}
.np{position:absolute;right:0;top:52px;width:340px;max-height:400px;overflow-y:auto;background:var(--card);border:1px solid var(--brd2);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:200;animation:fadeIn .2s}
[dir=rtl] .np{right:auto;left:0}
.rbdg{background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.nbdg{background:#e0e7ff;color:#3730a3;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:490}
/* LOGIN */
.lp{display:flex;height:100vh;overflow:hidden}
.ll{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:linear-gradient(135deg,#0d0d1a 0%,#180830 50%,#0d0d1a 100%);position:relative;overflow:hidden}
.ll::before{content:'';position:absolute;width:550px;height:550px;border-radius:50%;background:radial-gradient(circle,rgba(46,9,80,.5) 0%,transparent 70%);top:-180px;left:-180px;pointer-events:none}
.ll::after{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(212,42,60,.18) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.ll-inner{position:relative;z-index:1;text-align:center;max-width:430px;width:100%}
.slogan{font-size:16px;font-style:italic;color:var(--pur3);margin-top:12px;letter-spacing:.5px}
.ll-feats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:24px;text-align:left}
[dir=rtl] .ll-feats{text-align:right}
.ll-feat{background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:10px;padding:11px 12px}
.lr{width:410px;background:var(--card);border-left:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:38px 34px;flex-shrink:0}
[dir=rtl] .lr{border-left:none;border-right:1px solid var(--brd)}
.lerr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:9px 13px;color:var(--err);font-size:13px;margin-bottom:12px;display:none}
.lerr.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn .2s}
.spin{display:inline-block;animation:spin 1s linear infinite}
h1{font-size:22px;font-weight:800;margin-bottom:18px}
h3{font-size:14px;font-weight:700;margin-bottom:11px}
.fb{display:flex;justify-content:space-between;align-items:center}
.fac{display:flex;align-items:center}
.flex{display:flex}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.w100{width:100%}
/* MOBILE */
@media(max-width:768px){
  .sb{position:fixed;z-index:500;height:100vh;transform:translateX(-110%);width:228px!important;min-width:228px!important}
  [dir=rtl] .sb{transform:translateX(110%);left:auto;right:0}
  .sb.open{transform:translateX(0)!important}
  .mob-ov.show{display:block}
  .ll{display:none}
  .lr{width:100%;border:none;padding:28px 22px}
  .topbar{padding:0 10px;gap:6px;height:48px}
  .content{padding:12px}
  .g2,.g3,.g4,.g5{grid-template-columns:1fr!important;gap:10px!important}
  .ga{grid-template-columns:1fr 1fr!important;gap:10px!important}
  .hm{display:none!important}
  h1{font-size:18px}
  .kpi-v{font-size:17px}
  .card{padding:13px}
  .tw{overflow-x:auto}
  table{min-width:580px}
  .np{width:calc(100vw - 20px);right:10px}
  [dir=rtl] .np{right:auto;left:10px}
  .modal{width:calc(100vw - 16px)!important;margin:8px}
  .mbd{padding:14px}
  .g5{grid-template-columns:1fr 1fr!important}
}
@media(min-width:769px){.sm{display:none!important}}
</style>

function saveData(){

// Push with retry
function getCloudProvider(){
  // Auto-detect which service to use based on settings
  var s=D.settings||{};
  if(s.cloudProvider==='npoint')return'npoint';
  if(s.cloudProvider==='jsonbin')return'jsonbin';
  // Auto-detect: npoint has no master key, jsonbin requires one
  if(s.cloudBinId&&!s.cloudKey)return'npoint';
  return'jsonbin';
}
function cloudPush(){
  var s=D.settings||{};
  if(!s.cloudBinId)return;
  var provider=getCloudProvider();
  var url,method,headers,body;
  body=JSON.stringify(D);
  if(provider==='npoint'){
    url='https://api.npoint.io/'+s.cloudBinId;
    method='POST';
    headers={'Content-Type':'application/json'};
    if(s.cloudKey)headers['x-access-token']=s.cloudKey;
  } else {
    if(!s.cloudKey)return;
    url='https://api.jsonbin.io/v3/b/'+s.cloudBinId;
    method='PUT';
    headers={'Content-Type':'application/json','X-Master-Key':s.cloudKey};
  }
  fetch(url,{method:method,headers:headers,body:body})
  .catch(function(){
    setTimeout(function(){
      fetch(url,{method:method,headers:headers,body:body}).catch(function(){});
    },4000);
  });
}
function loadData(){
  try{var r=localStorage.getItem(SK);if(r){var p=JSON.parse(r);if(p&&p.users)D=p;}}catch(e){}
  try{var s=sessionStorage.getItem(SSK);if(s)SU=JSON.parse(s);}catch(e){}
  if(!D.settings)D.settings={cloudMode:false,cloudKey:'',cloudBinId:''};
  if(!D.auditLog)D.auditLog=[];
}
function cloudPush(){
  fetch('https://api.jsonbin.io/v3/b/'+D.settings.cloudBinId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':D.settings.cloudKey},body:JSON.stringify(D)}).catch(function(){});
}
function cloudPull(){
  V.cloudSync=true;render();
  fetch('https://api.jsonbin.io/v3/b/'+D.settings.cloudBinId+'/latest',{headers:{'X-Master-Key':D.settings.cloudKey}})
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.record&&j.record.users){D=j.record;if(!D.settings)D.settings={cloudMode:true,cloudKey:'',cloudBinId:''};localStorage.setItem(SK,JSON.stringify(D));}
    else{alert('Sync failed — check your Bin ID and Master Key.');}

  }).catch(function(e){alert('Cloud sync failed: '+e.message);V.cloudSync=false;render();});
}

function myCs(){return SU&&SU.role==='admin'?D.customers:D.customers.filter(function(c){return c.repId===SU.id;});}
function myDs(){return SU&&SU.role==='admin'?D.deals:D.deals.filter(function(d){return d.repId===SU.id;});}
function myTs(){return SU&&SU.role==='admin'?D.tasks:D.tasks.filter(function(t){return t.repId===SU.id;});}

function filterCs(list){
  return list.filter(function(c){
    if(V.fStatus!=='all'&&c.status!==V.fStatus)return false;
    if(V.fRep!=='all'&&c.repId!==V.fRep)return false;
    if(V.search){
      var s=V.search.toLowerCase().trim();
      if(!s)return true;
      var rep=D.users.filter(function(u){return u.id===c.repId;})[0];
      var repName=rep?rep.name:'';
      var tagStr=(c.tags||[]).join(' ');
      return(c.name||'').toLowerCase().indexOf(s)>=0||
        (c.company||'').toLowerCase().indexOf(s)>=0||
        (c.email||'').toLowerCase().indexOf(s)>=0||
        (c.phone||'').toLowerCase().indexOf(s)>=0||
        (c.address||'').toLowerCase().indexOf(s)>=0||
        (c.notes||'').toLowerCase().indexOf(s)>=0||
        (c.source||'').toLowerCase().indexOf(s)>=0||
        tagStr.toLowerCase().indexOf(s)>=0||
        repName.toLowerCase().indexOf(s)>=0;
    }
    return true;
  });
}

function pStats(c){
  var ps=c.purchases.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var cnt=ps.length,total=0;
  for(var i=0;i<ps.length;i++)total+=ps[i].amount;
  var avg=cnt?total/cnt:0;
  var avgDays=null;
  if(cnt>1){var td=0;for(var j=1;j<ps.length;j++)td+=daysDiff(ps[j-1].date,ps[j].date);avgDays=Math.round(td/(cnt-1));}
  var last=ps[ps.length-1]||null,first=ps[0]||null;
  var daysSince=last?daysDiff(last.date,todayStr()):null;
  return{cnt:cnt,total:total,avg:avg,avgDays:avgDays,daysSince:daysSince,first:first,last:last,sorted:ps};
}

function leadScore(c){
  var s=0,ps=pStats(c);
  if(ps.total>50000)s+=30;else if(ps.total>20000)s+=25;else if(ps.total>5000)s+=15;else if(ps.total>0)s+=8;
  s+=Math.min(ps.cnt*4,20);
  var ra=0;
  for(var i=0;i<D.activities.length;i++){if(D.activities[i].customerId===c.id&&daysDiff(D.activities[i].date,todayStr())<30)ra++;}
  s+=Math.min(ra*5,15);
  if(c.lastContact){var g=daysDiff(c.lastContact.slice(0,10),todayStr());if(g<7)s+=10;else if(g<30)s+=5;else if(g>90)s-=10;}
  var ad=0;
  for(var j=0;j<D.deals.length;j++){if(D.deals[j].customerId===c.id&&D.deals[j].stage!=='closed_won'&&D.deals[j].stage!=='closed_lost')ad++;}
  s+=Math.min(ad*5,10);
  if(c.tags&&c.tags.indexOf('VIP')>=0)s+=10;
  if(c.tags&&c.tags.indexOf('Bulk')>=0)s+=5;
  if(c.status==='churned')s-=15;
  return Math.max(0,Math.min(100,s));
}

function aiIns(c){
  var r=[],gap=c.lastContact?daysDiff(c.lastContact.slice(0,10),todayStr()):999;
  if(gap>60&&c.status!=='churned')r.push({t:'warning',i:'⚠️',m:'No contact in '+gap+' days — risk of churning.'});
  if(gap>30&&gap<=60)r.push({t:'info',i:'📞',m:'Last contact '+gap+' days ago. Consider reaching out.'});
  var hasAct=false;for(var i=0;i<D.activities.length;i++){if(D.activities[i].customerId===c.id){hasAct=true;break;}}
  if(c.status==='lead'&&!hasAct)r.push({t:'action',i:'🎯',m:'New lead — no activity yet. Make first contact!'});
  if(c.status==='churned')r.push({t:'action',i:'🔄',m:'Churned. Consider a win-back campaign with special pricing.'});
  var ps=pStats(c);
  if(ps.cnt>1&&ps.avgDays&&ps.daysSince>ps.avgDays*1.3)r.push({t:'opportunity',i:'🛒',m:'Avg order cycle: '+ps.avgDays+' days. '+ps.daysSince+' days since last order — may be ready to reorder.'});
  if(ps.total>30000)r.push({t:'positive',i:'⭐',m:'High-value customer. Consider VIP treatment.'});
  var av=[];for(var j=0;j<D.deals.length;j++){if(D.deals[j].customerId===c.id&&D.deals[j].stage!=='closed_won'&&D.deals[j].stage!=='closed_lost')av.push(D.deals[j]);}
  if(av.length){var avv=0;for(var k=0;k<av.length;k++)avv+=av[k].value;r.push({t:'info',i:'💰',m:av.length+' active deal(s) worth '+fc(avv)+'.'});}
  return r;
}

function getNots(){
  var r=[],td=todayStr();
  var tasks=myTs();
  for(var i=0;i<tasks.length;i++){
    var tk=tasks[i];
    if(tk.done)continue;
    if(tk.dueDate===td)r.push({id:'nt'+tk.id,i:'📋',title:'Task due today',body:tk.title,link:'tasks'});
    else if(tk.dueDate<td)r.push({id:'no'+tk.id,i:'🔴',title:'Overdue task',body:tk.title+' — '+tk.dueDate,link:'tasks'});
    else if(daysDiff(td,tk.dueDate)<=2)r.push({id:'ns'+tk.id,i:'⏰',title:'Task due soon',body:tk.title+' — '+tk.dueDate,link:'tasks'});
  }
  var cs=myCs();
  for(var j=0;j<cs.length;j++){
    var c=cs[j];
    if(c.status==='churned')continue;
    var g=c.lastContact?daysDiff(c.lastContact.slice(0,10),td):999;
    if(g>45)r.push({id:'nc'+c.id,i:'📞',title:'Follow-up needed',body:c.name+' — '+g+' days',link:'customers',cid:c.id});
  }
  var deals=myDs();
  for(var k=0;k<deals.length;k++){
    var dl=deals[k];
    if(dl.stage==='closed_won'||dl.stage==='closed_lost')continue;
    if(dl.expectedClose<=td)r.push({id:'nd'+dl.id,i:'💰',title:'Deal past close date',body:dl.title,link:'deals'});
    else if(daysDiff(td,dl.expectedClose)<=7)r.push({id:'nds'+dl.id,i:'📊',title:'Deal closing soon',body:dl.title,link:'deals'});
  }
  return r.filter(function(n){return V.dismissed.indexOf(n.id)<0;});
}

function ico(n,sz,c){return '<svg width="'+sz+'" height="'+sz+'" fill="none" stroke="'+(c||'currentColor')+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="'+(ICONS[n]||'')+'"/></svg>';}
function spark(data,w,h,color){
  if(!data||data.length<2)return'';
  var max=0,min=Infinity;
  for(var i=0;i<data.length;i++){if(data[i]>max)max=data[i];if(data[i]<min)min=data[i];}
  if(max===min)max=min+1;
  var range=max-min;
  var pts='';
  for(var j=0;j<data.length;j++){pts+=(j/(data.length-1)*w)+','+(h-((data[j]-min)/range)*h)+' ';}
  return '<svg width="'+w+'" height="'+h+'" style="display:block;max-width:100%"><polyline points="'+pts.trim()+'" fill="none" stroke="'+(color||'#d42a3c')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function mbar(data,w,h){
  if(!data||!data.length)return'';
  var max=0;for(var i=0;i<data.length;i++)if(data[i].v>max)max=data[i].v;
  if(!max)max=1;
  var bw=Math.min(30,(w-(data.length-1)*4)/data.length);
  var s='<svg width="'+w+'" height="'+(h+20)+'" style="max-width:100%">';
  for(var j=0;j<data.length;j++){
    var bh=Math.max(2,(data[j].v/max)*h);
    s+='<rect x="'+(j*(bw+4))+'" y="'+(h-bh)+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+(data[j].c||'#d42a3c')+'" opacity=".85"/>';
    s+='<text x="'+(j*(bw+4)+bw/2)+'" y="'+(h+14)+'" text-anchor="middle" font-size="9" fill="#8888aa">'+data[j].l+'</text>';
  }
  s+='</svg>';return s;
}

function rDash(){
  var isAdmin=SU&&SU.role==='admin';
  var cs=myCs(),dls=myDs(),allTasks=myTs();
  var rev=0;for(var i=0;i<cs.length;i++)for(var j=0;j<cs[i].purchases.length;j++)rev+=cs[i].purchases[j].amount;
  var activeDls=[];for(var k=0;k<dls.length;k++)if(dls[k].stage!=='closed_won'&&dls[k].stage!=='closed_lost')activeDls.push(dls[k]);
  var pv=0,wv=0;for(var m=0;m<activeDls.length;m++){pv+=activeDls[m].value;wv+=activeDls[m].value*activeDls[m].probability/100;}
  var stCnt={lead:0,prospect:0,customer:0,churned:0};for(var n=0;n<cs.length;n++)stCnt[cs[n].status]++;

// ── RENDER: DEALS ─────────────────────────────────────
function rDeals(){
  var dls=myDs(),cs=myCs();
  var active=[];for(var i=0;i<dls.length;i++)if(dls[i].stage!=='closed_won'&&dls[i].stage!=='closed_lost')active.push(dls[i]);
  var pv=0,wv=0;for(var j=0;j<active.length;j++){pv+=active[j].value;wv+=active[j].value*active[j].probability/100;}
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h1 style="margin:0">'+T('deals')+'</h1><button class="btn btn-r btn-sm" onclick="A.mod(\'deal\',null)">'+T('newdeal')+'</button></div>'
    +'<div class="g3 mb16">'
    +'<div class="kpi"><div class="kpi-l">'+T('pipeval')+'</div><div class="kpi-v" style="color:var(--red)">'+fc(pv)+'</div></div>'
    +'<div class="kpi"><div class="kpi-l">'+T('wpipe')+'</div><div class="kpi-v" style="color:var(--grn)">'+fc(Math.round(wv))+'</div></div>'
    +'<div class="kpi"><div class="kpi-l">'+(LG==='ar'?'الصفقات النشطة':'Active Deals')+'</div><div class="kpi-v" style="color:var(--pur2)">'+active.length+'</div></div>'
    +'</div><div class="g5" style="align-items:start">';
  for(var si=0;si<DS.length;si++){
    var stg=DS[si];var dm=DM[stg];
    var stDeals=[];for(var di=0;di<dls.length;di++)if(dls[di].stage===stg)stDeals.push(dls[di]);
    html+='<div><div style="display:flex;align-items:center;gap:6px;margin-bottom:9px"><span class="badge" style="background:'+dm.bg+';color:'+dm.fg+'">'+dm.label+'</span><span style="font-size:12px;color:var(--t2)">'+stDeals.length+'</span></div>';
    for(var sdi=0;sdi<stDeals.length;sdi++){
      var dl=stDeals[sdi];var dc=null;for(var dci=0;dci<cs.length;dci++)if(cs[dci].id===dl.customerId){dc=cs[dci];break;}
      var pc=dl.probability>=60?'var(--grn)':dl.probability>=30?'var(--ylw)':'var(--err)';

// ── RENDER: REPORTS ───────────────────────────────────
function rReports(){
  var isAdmin=SU&&SU.role==='admin';
  var cs=myCs();
  var tot=0;for(var i=0;i<cs.length;i++)for(var j=0;j<cs[i].purchases.length;j++)tot+=cs[i].purchases[j].amount;
  var stc={lead:0,prospect:0,customer:0,churned:0};for(var k=0;k<cs.length;k++)stc[cs[k].status]++;

  }
  rps.sort(function(a,b){return b.rv-a.rv;});
  var topCs=cs.slice();topCs.sort(function(a,b){var at=0,bt=0;for(var i=0;i<a.purchases.length;i++)at+=a.purchases[i].amount;for(var j=0;j<b.purchases.length;j++)bt+=b.purchases[j].amount;return bt-at;});if(topCs.length>5)topCs=topCs.slice(0,5);

  var stH='';var statuses2=['lead','prospect','customer','churned'];for(var sti=0;sti<statuses2.length;sti++){var sk=statuses2[sti];var sm=SM[sk];var cnt=stc[sk];var p2=cs.length?Math.round(cnt/cs.length*100):0;stH+='<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500">'+sm.icon+' '+smLabel(sk)+'</span><span style="color:var(--t2)">'+cnt+' ('+p2+'%)</span></div><div class="prog"><div class="prog-bar" style="width:'+p2+'%;background:'+sm.fg+'"></div></div></div>';}
  var topH='';for(var tci=0;tci<topCs.length;tci++){var tc=topCs[tci];var tv=0;for(var tpi=0;tpi<tc.purchases.length;tpi++)tv+=tc.purchases[tpi].amount;var tp=tot?Math.round(tv/tot*100):0;topH+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:11px"><span style="width:20px;height:20px;border-radius:50%;background:var(--rs);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--red);flex-shrink:0">'+(tci+1)+'</span><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600">'+esc(tc.name)+'</span><span style="color:var(--red);font-weight:700;font-size:12px">'+fc(tv)+'</span></div><div class="prog"><div class="prog-bar" style="width:'+tp+'%;background:var(--red)"></div></div></div></div>';}
  var repTopH='';var repBsSorted=repBs.slice().sort(function(a,b){return b.purchases.length-a.purchases.length;});if(repBsSorted.length>5)repBsSorted=repBsSorted.slice(0,5);for(var rbi=0;rbi<repBsSorted.length;rbi++){var rb=repBsSorted[rbi];var rbv=0;for(var rbpi=0;rbpi<rb.purchases.length;rbpi++)rbv+=rb.purchases[rbpi].amount;repTopH+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-weight:700;color:var(--grn);font-size:13px">'+rb.purchases.length+'×</span><span style="font-size:13px">'+esc(rb.name)+'</span><span style="font-size:11px;color:var(--t2)">'+fc(rbv)+'</span></div>';}

  return '<h1>'+T('reports')+(isAdmin?' (All)':' (Mine)')+'</h1>'

    +'<div class="g2"><div class="card"><h3>🔄 '+T('purchfreq')+'</h3>'
    +'<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:var(--grn)">'+T('repbuylbl')+'</span><span style="font-weight:700;color:var(--grn)">'+repBs.length+'</span></div><div class="prog"><div class="prog-bar" style="width:'+(cs.length?Math.round(repBs.length/cs.length*100):0)+'%;background:var(--grn)"></div></div></div>'

    +'<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:var(--t2)">'+T('nobuy')+'</span><span style="font-weight:700;color:var(--t2)">'+noBs.length+'</span></div><div class="prog"><div class="prog-bar" style="width:'+(cs.length?Math.round(noBs.length/cs.length*100):0)+'%;background:var(--t2)"></div></div></div>'

    +'</div><div class="card"><h3>'+T('topcust')+'</h3>'+topH+'</div></div>';
}

// ── TAG HELPERS (global for inline event access) ──────
function addTagEv(e){
  if(e.key==='Enter'){
    var inp=document.getElementById('cf-tg');
    var v=inp?inp.value.trim():'';
    if(v&&_tags.indexOf(v)<0){_tags.push(v);if(inp)inp.value='';}
    var bx=document.getElementById('tgbx');
    if(bx){var th='';for(var i=0;i<_tags.length;i++)th+='<span class="tag">'+esc(_tags[i])+'<span onclick="rmTag('+i+')" style="cursor:pointer;margin-left:4px;font-weight:700">×</span></span>';bx.innerHTML=th;}
    e.preventDefault();
  }
}
function rmTag(i){
  _tags.splice(i,1);
  var bx=document.getElementById('tgbx');
  if(bx){var th='';for(var j=0;j<_tags.length;j++)th+='<span class="tag">'+esc(_tags[j])+'<span onclick="rmTag('+j+')" style="cursor:pointer;margin-left:4px;font-weight:700">×</span></span>';bx.innerHTML=th;}
}
function closeSb(){

// ── GET VALUE ─────────────────────────────────────────
function gv(id){var el=document.getElementById(id);return el?el.value:'';}

// ── RENDER ────────────────────────────────────────────
function render(){
  var r=document.getElementById('ROOT');
  if(r){r.lang=LG;r.dir=LG==='ar'?'rtl':'ltr';}
  if(!SU){document.getElementById('app').innerHTML=rLogin();return;}
  var pg='';
  if(V.tab==='dashboard')pg=rDash();
  else if(V.tab==='customers')pg=V.custId?rCustDetail(V.custId):rCustList();
  else if(V.tab==='deals')pg=rDeals();
  else if(V.tab==='tasks')pg=rTasks();
  else if(V.tab==='pipeline')pg=rPipeline();
  else if(V.tab==='emails')pg=rEmails();
  else if(V.tab==='reports')pg=rReports();
  else if(V.tab==='auditlog')pg=rAudit();
  else if(V.tab==='usermgmt')pg=rUserMgmt();
  else if(V.tab==='settings')pg=rSettings();
  document.getElementById('app').innerHTML='<div class="layout">'+rSb()+'<div class="main">'+rTopbar()+'<div class="content fade">'+pg+'</div></div></div>'+rModal();
  var ov=document.getElementById('mOv');if(ov)ov.className='mob-ov'+(_sbOpen?' show':'');
}

  emailTo:function(cid,tid){V.tplId=tid;V.modal={type:'email',id:cid};render();},
  setTpl:function(tid,cid){V.tplId=tid;V.modal={type:'email',id:cid};render();},
  cpyEm:function(){var s=gv('em-s'),b=gv('em-b');if(navigator.clipboard){navigator.clipboard.writeText('Subject: '+s+'\n\n'+b).then(function(){var btn=document.getElementById('em-cp');if(btn){btn.textContent='✓ Copied!';btn.style.background='var(--grn)';setTimeout(function(){btn.textContent='📋 Copy';btn.style.background='';},2000);}});}else{alert('Subject: '+s+'\n\n'+b.slice(0,100)+'...');}},
  auF:function(type,v){if(type==='u')V.auditUser=v;else V.auditType=v;render();},

  savC:function(id){
    var n=gv('cf-n').trim();if(!n){alert(LG==='ar'?'الاسم مطلوب':'Name is required');return;}
    var c={id:id||'c'+uid(),name:n,company:gv('cf-co'),email:gv('cf-em'),phone:gv('cf-ph'),status:gv('cf-st'),repId:gv('cf-rp'),notes:gv('cf-nt'),source:gv('cf-src'),address:gv('cf-adr'),tags:_tags.slice()};
    if(id){var ex=null;for(var i=0;i<D.customers.length;i++)if(D.customers[i].id===id){ex=D.customers[i];break;}if(ex){c.createdAt=ex.createdAt;c.lastContact=ex.lastContact;c.purchases=ex.purchases;}for(var j=0;j<D.customers.length;j++)if(D.customers[j].id===id){D.customers[j]=c;break;}addAudit('UPDATE_CUST',c.name,'Customer profile updated');}
    else{c.createdAt=new Date().toISOString();c.lastContact=new Date().toISOString();c.purchases=[];D.customers.push(c);addAudit('CREATE_CUST',c.name,'New '+c.status+' created');}
    saveData();this.cls();
  },
  delC:function(id){if(!confirm(T('confdelcust')))return;var cn='';for(var i=0;i<D.customers.length;i++)if(D.customers[i].id===id){cn=D.customers[i].name;break;}D.customers=D.customers.filter(function(x){return x.id!==id;});D.activities=D.activities.filter(function(x){return x.customerId!==id;});D.tasks=D.tasks.filter(function(x){return x.customerId!==id;});D.deals=D.deals.filter(function(x){return x.customerId!==id;});if(V.custId===id)V.custId=null;addAudit('DELETE_CUST',cn,'Customer deleted');saveData();render();},

  savD:function(id){
    var tl=gv('df-t').trim(),vl=Number(gv('df-v'));if(!tl||!vl){alert(LG==='ar'?'العنوان والقيمة مطلوبان':'Title and value are required');return;}
    var dl={id:id||'d'+uid(),title:tl,value:vl,customerId:gv('df-c'),repId:gv('df-r'),stage:gv('df-s'),probability:Number(gv('df-p')),expectedClose:gv('df-e'),notes:gv('df-n')};
    if(id){var ex=null;for(var i=0;i<D.deals.length;i++)if(D.deals[i].id===id){ex=D.deals[i];break;}if(ex)dl.createdAt=ex.createdAt;for(var j=0;j<D.deals.length;j++)if(D.deals[j].id===id){D.deals[j]=dl;break;}addAudit('UPDATE_DEAL',dl.title,'Deal updated');}
    else{dl.createdAt=new Date().toISOString();D.deals.push(dl);addAudit('CREATE_DEAL',dl.title,'New deal: '+fc(dl.value));}
    saveData();this.cls();
  },
  delD:function(id){if(!confirm(T('confdel')))return;var dn='';for(var i=0;i<D.deals.length;i++)if(D.deals[i].id===id){dn=D.deals[i].title;break;}D.deals=D.deals.filter(function(x){return x.id!==id;});addAudit('DELETE_DEAL',dn,'Deleted');saveData();render();},

  savT:function(id){
    var tl=gv('tf-t').trim();if(!tl){alert(LG==='ar'?'العنوان مطلوب':'Title required');return;}
    var tk={id:id||'t'+uid(),title:tl,customerId:gv('tf-c'),repId:gv('tf-r'),dueDate:gv('tf-d'),priority:gv('tf-p'),done:false,createdAt:new Date().toISOString(),createdBy:SU?SU.id:''};
    if(id){var ex=null;for(var i=0;i<D.tasks.length;i++)if(D.tasks[i].id===id){ex=D.tasks[i];break;}if(ex){tk.done=ex.done;tk.createdAt=ex.createdAt;tk.createdBy=ex.createdBy;}for(var j=0;j<D.tasks.length;j++)if(D.tasks[j].id===id){D.tasks[j]=tk;break;}addAudit('UPDATE_TASK',tk.title,'Updated');}
    else{D.tasks.push(tk);addAudit('CREATE_TASK',tk.title,'Due '+tk.dueDate);}
    saveData();this.cls();
  },
  tog:function(id){for(var i=0;i<D.tasks.length;i++)if(D.tasks[i].id===id){D.tasks[i].done=!D.tasks[i].done;addAudit('COMPLETE_TASK',D.tasks[i].title,D.tasks[i].done?'Completed':'Reopened');break;}saveData();render();},
  delT:function(id){if(!confirm(T('confdel')))return;var tn='';for(var i=0;i<D.tasks.length;i++)if(D.tasks[i].id===id){tn=D.tasks[i].title;break;}D.tasks=D.tasks.filter(function(x){return x.id!==id;});addAudit('DELETE_TASK',tn,'Deleted');saveData();render();},

  savP:function(cid){
    var items=gv('pf-i').trim(),amount=Number(gv('pf-a'));if(!items||!amount){alert(LG==='ar'?'البيانات مطلوبة':'Items and amount required');return;}
    var p={id:'p'+uid(),date:gv('pf-d'),items:items,amount:amount,addedAt:new Date().toISOString(),addedBy:SU?SU.id:''};
    for(var i=0;i<D.customers.length;i++)if(D.customers[i].id===cid){D.customers[i].purchases.push(p);D.customers[i].lastContact=new Date().toISOString();addAudit('ADD_PURCHASE',D.customers[i].name,items+' — '+fc(amount));break;}
    saveData();this.cls();
  },

  savA:function(cid){
    var note=gv('af-n').trim();if(!note){alert(LG==='ar'?'الملاحظة مطلوبة':'Note required');return;}
    var a={id:'a'+uid(),customerId:cid,type:gv('af-t'),note:note,date:gv('af-d'),repId:gv('af-r'),ts:new Date().toISOString()};
    D.activities.push(a);
    for(var i=0;i<D.customers.length;i++)if(D.customers[i].id===cid){D.customers[i].lastContact=new Date().toISOString();addAudit('LOG_ACT',D.customers[i].name,a.type+': '+note.slice(0,60));break;}
    saveData();this.cls();
  },

  savU:function(id){
    var n=gv('uf-n').trim();if(!n){alert(LG==='ar'?'الاسم مطلوب':'Name required');return;}
    if(!id){var un=gv('uf-u').trim();if(!un){alert('Username required');return;}var exists=false;for(var i=0;i<D.users.length;i++)if(D.users[i].username===un){exists=true;break;}if(exists){alert('Username already exists');return;}var pwd=gv('uf-p');if(!pwd||pwd.length<6){alert('Password min 6 chars');return;}D.users.push({id:'u'+uid(),username:un,password:pwd,name:n,email:gv('uf-e'),role:gv('uf-r'),color:gv('uf-c')||'#3b82f6',createdAt:new Date().toISOString(),active:true,createdBy:SU?SU.id:''});addAudit('CREATE_USER',n,'New '+gv('uf-r')+': '+un);}
    else{for(var j=0;j<D.users.length;j++)if(D.users[j].id===id){D.users[j].name=n;D.users[j].email=gv('uf-e');D.users[j].color=gv('uf-c');if(D.users[j].id!=='u1'&&D.users[j].id!=='u2')D.users[j].role=gv('uf-r');addAudit('UPDATE_USER',n,'Profile updated');break;}}
    saveData();this.cls();
  },
  delU:function(id){var u=null;for(var i=0;i<D.users.length;i++)if(D.users[i].id===id){u=D.users[i];break;}if(!u||u.id==='u1'||u.id==='u2')return;if(!confirm(T('confdeluser')))return;D.users=D.users.filter(function(x){return x.id!==id;});addAudit('DELETE_USER',u.name,'Deleted');saveData();render();},
  togU:function(id){for(var i=0;i<D.users.length;i++)if(D.users[i].id===id){D.users[i].active=D.users[i].active===false?true:false;addAudit('UPDATE_USER',D.users[i].name,D.users[i].active?'Enabled':'Disabled');break;}saveData();render();},
  chPwd:function(id){
    var np=gv('cp-new'),cp=gv('cp-con');
    if(!np||np.length<6){alert('Password min 6 chars');return;}
    if(np!==cp){alert(LG==='ar'?'كلمتا المرور غير متطابقتين':'Passwords do not match');return;}
    if(id===SU.id){var op=gv('cp-old');if(op!==SU.password){alert(LG==='ar'?'كلمة المرور الحالية غير صحيحة':'Current password incorrect');return;}}
    for(var i=0;i<D.users.length;i++)if(D.users[i].id===id){D.users[i].password=np;if(id===SU.id){SU.password=np;try{sessionStorage.setItem(SSK,JSON.stringify(SU));}catch(e){}}addAudit('CHANGE_PWD',D.users[i].name,'Password changed');break;}
    saveData();this.cls();
  },

  setCfg:function(k,v){if(!D.settings)D.settings={cloudMode:false,cloudKey:'',cloudBinId:''};D.settings[k]=v;saveData();render();},
  savCloud:function(){if(!D.settings)D.settings={cloudMode:true,cloudKey:'',cloudBinId:''};D.settings.cloudKey=gv('cfg-key');D.settings.cloudBinId=gv('cfg-bid');addAudit('SETTINGS','Cloud','Settings saved');saveData();render();alert(LG==='ar'?'تم الحفظ! انقر مزامنة للاختبار.':'Saved! Click Sync Now to test.');},
  doPull:function(){cloudPull();},
  expData:function(){var blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='sedradent-backup-'+todayStr()+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(url);},3000);addAudit('SETTINGS','Backup','Data exported');},
  impData:function(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var imp=JSON.parse(e.target.result);if(imp&&imp.users){if(confirm(T('confimport'))){D=imp;if(!D.settings)D.settings={cloudMode:false,cloudKey:'',cloudBinId:''};if(!D.auditLog)D.auditLog=[];saveData();addAudit('SETTINGS','Import','Data imported');render();}}}catch(ex){alert('Invalid JSON file');}};r.readAsText(f);},
  resetData:function(){if(confirm(T('confreset'))){D=JSON.parse(JSON.stringify(INIT));saveData();render();}},
  dl:function(){
    try{
      var src=document.documentElement.outerHTML;
      // Embed current cloud settings so all users auto-connect on open
      var cfg=JSON.stringify(D.settings||{cloudMode:false,cloudKey:'',cloudBinId:''});
      src=src.replace(
        "settings:{cloudMode:false,cloudKey:'',cloudBinId:''}",
        "settings:"+cfg
      );
      // Also embed current users list so accounts are preserved
      var usersJson=JSON.stringify(D.users||[]);
      src=src.replace(/users:\[[\s\S]*?\],\s*customers:/,function(match){
        // Only replace the users array in INIT, preserve rest
        return "users:"+usersJson+",\n  customers:";
      });
      var full='<!DOCTYPE html>\n'+src;
      var blob=new Blob([full],{type:'text/html;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download='SEDRADENT-CRM.html';a.click();
      setTimeout(function(){URL.revokeObjectURL(url);},5000);
      addAudit('SETTINGS','Download','App downloaded with embedded cloud settings');
    }catch(e){alert('Right-click → Save As → SEDRADENT-CRM.html');}
  }
};

// ── INIT ──────────────────────────────────────────────
loadData();
var _root=document.getElementById('ROOT');
if(_root){_root.lang=LG;_root.dir=LG==='ar'?'rtl':'ltr';}
render();
// Auto-pull from cloud on startup if configured
if(D.settings&&D.settings.cloudMode&&D.settings.cloudKey&&D.settings.cloudBinId){
  setTimeout(function(){
    fetch('https://api.jsonbin.io/v3/b/'+D.settings.cloudBinId+'/latest',{headers:{'X-Master-Key':D.settings.cloudKey}})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j.record&&j.record.users){
        // Merge: keep current session user but update all data
        var prevSession=SU;
        D=j.record;
        if(!D.settings)D.settings={cloudMode:true,cloudKey:'',cloudBinId:''};
        if(!D.auditLog)D.auditLog=[];
        localStorage.setItem(SK,JSON.stringify(D));
        // Re-validate session user against updated user list
        if(prevSession){
          var stillValid=false;
          for(var i=0;i<D.users.length;i++){
            if(D.users[i].id===prevSession.id&&D.users[i].active!==false){
              SU=D.users[i];stillValid=true;break;
            }
          }
          if(!stillValid){SU=null;try{sessionStorage.removeItem(SSK);}catch(e){}}
        }
        render();
      }
    }).catch(function(){/* silent fail - continue with local data */});
  },1500);
}
// Auto-push to cloud every 60 seconds if configured
setInterval(function(){
  if(SU&&D.settings&&D.settings.cloudMode&&D.settings.cloudKey&&D.settings.cloudBinId){
    cloudPush();
  }
},60000);
</script>
